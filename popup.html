<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Smart Autofill</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">

  <h2>🚀 Smart Autofill</h2>

  <input id="name" placeholder="Full Name">
  <input id="email" placeholder="Email Address">
  <input id="phone" placeholder="Phone Number">
  <textarea id="about" placeholder="Short Description"></textarea>

  <button id="save" class="btn dark">Save Data</button>
  <button id="fillAll" class="btn green">Autofill All</button>
  <button id="fillReq" class="btn blue">Required Only</button>

</div>

<script src="popup.js"></script>
</body>
</html>
